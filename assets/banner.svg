<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="450" cy="150" rx="350" ry="100" fill="url(#glow)"/>

  <!-- USB icon -->
  <g transform="translate(115, 95)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- USB body -->
    <rect x="0" y="20" width="50" height="70" rx="4" fill="#d97706" fill-opacity="0.1"/>
    <!-- USB connector -->
    <rect x="10" y="0" width="30" height="25" rx="2" fill="#d97706" fill-opacity="0.15"/>
    <!-- USB pins -->
    <line x1="20" y1="5" x2="20" y2="18"/>
    <line x1="30" y1="5" x2="30" y2="18"/>
    <!-- Signal waves -->
    <path d="M 58 40 Q 68 40 68 50 Q 68 60 78 60" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <path d="M 58 50 Q 68 50 68 60 Q 68 70 78 70" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <path d="M 58 60 Q 68 60 68 70 Q 68 80 78 80" stroke="#8b5cf6" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="220" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Portable Agent USB
  </text>

  <!-- Subtitle -->
  <text x="220" y="170" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#9ca3af" letter-spacing="0.5">
    AI coding agents on a flash drive. Plug in. Code. Unplug.
  </text>

  <!-- Tags -->
  <g transform="translate(220, 195)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-width="1" stroke-opacity="0.3"/>
    <text x="50" y="17" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">Claude Code</text>

    <rect x="112" y="0" width="110" height="26" rx="13" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
    <text x="167" y="17" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">OpenAI Codex</text>

    <rect x="234" y="0" width="80" height="26" rx="13" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="274" y="17" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Portable</text>

    <rect x="326" y="0" width="90" height="26" rx="13" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
    <text x="371" y="17" font-family="system-ui, sans-serif" font-size="12" fill="#f87171" text-anchor="middle">No Install</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="50" y="280" width="800" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
